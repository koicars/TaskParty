<style>
/* =========================================================
   PROJECTS — a clean, Apple-inspired productivity dashboard.
   Soft neutral surfaces, restrained accent colors, generous
   whitespace, activity-ring progress, glass modal.
   ========================================================= */

:root{
  --bg:            #f5f5f7;
  --surface:       #ffffff;
  --surface-2:     #fbfbfd;
  --ink:           #1d1d1f;
  --ink-soft:      #6e6e73;
  --ink-faint:     #a1a1a6;
  --hairline:      rgba(0,0,0,.07);
  --hairline-soft: rgba(0,0,0,.045);

  --blue:    #0a84ff;
  --green:   #30d158;
  --pink:    #ff375f;
  --gray:    #8e8e93;
  --orange:  #ff9f0a;
  --purple:  #bf5af2;

  --radius-xl: 26px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --ease: cubic-bezier(.28,.11,.32,1);
  --dur: 260ms;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ---------- ambient background blobs ---------- */
.bg-blobs{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.blob{
  position:absolute;
  border-radius:50%;
  filter: blur(90px);
  opacity:.35;
  animation: drift 22s ease-in-out infinite;
}
.blob.b1{ width:520px; height:520px; background: radial-gradient(circle, #7dc4ff, transparent 70%); top:-160px; left:-120px; animation-duration: 26s; }
.blob.b2{ width:460px; height:460px; background: radial-gradient(circle, #ffb0c9, transparent 70%); top:120px; right:-140px; animation-duration: 30s; animation-delay: -6s; }
.blob.b3{ width:420px; height:420px; background: radial-gradient(circle, #d0b3ff, transparent 70%); bottom:-160px; left:30%; animation-duration: 24s; animation-delay: -12s; }
@keyframes drift{
  0%,100%{ transform: translate(0,0) scale(1); }
  50%{ transform: translate(30px,-24px) scale(1.06); }
}
@media (prefers-reduced-motion: reduce){ .blob{ animation:none; } }

/* ---------- layout shell ---------- */
.app{
  position:relative; z-index:1;
  max-width:1180px;
  margin:0 auto;
  padding: 48px 28px 90px;
}

.title-plate{
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:20px; flex-wrap:wrap;
  margin-bottom:34px;
  animation: fadeUp 520ms var(--ease) both;
}
@keyframes fadeUp{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }
.title-block h1{
  font-size: 34px;
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 6px;
  color: var(--ink);
}
.title-block p{ margin:0; font-size:15px; color: var(--ink-soft); font-weight:500; }

.header-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.save-indicator{
  display:flex; align-items:center; gap:8px;
  font-size:13px; font-weight:600;
  color: var(--ink-soft);
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(14px);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  padding: 9px 16px;
}
.save-dot{ width:7px; height:7px; border-radius:50%; background: var(--green); box-shadow: 0 0 0 3px rgba(48,209,88,.18); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

/* ---------- cloud sync (Firebase) ---------- */
.sync-btn{
  display:flex; align-items:center; gap:7px;
  font-family: var(--font); font-size:13px; font-weight:600;
  color: var(--ink-soft);
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(14px);
  border: 1px solid var(--hairline);
  border-radius: 999px;
  padding: 9px 14px;
  cursor:pointer;
  transition: background 140ms var(--ease), color 140ms var(--ease);
}
.sync-btn:hover{ background: rgba(255,255,255,.95); }
.sync-btn.connected{ color: var(--blue); }
.sync-dot{ width:7px; height:7px; border-radius:50%; background: var(--ink-faint); }
.sync-btn.connected .sync-dot{ background: var(--blue); box-shadow: 0 0 0 3px rgba(10,132,255,.18); }

.sync-popover{
  position:fixed; z-index:120;
  width:min(300px, calc(100vw - 24px));
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid var(--hairline);
  border-radius: 18px;
  box-shadow: 0 20px 50px rgba(0,0,0,.22);
  padding:16px;
  display:none;
  opacity:0; transform: scale(.94) translateY(-4px);
  transition: opacity 160ms var(--ease), transform 160ms var(--ease);
}
.sync-popover.open{ display:block; opacity:1; transform: scale(1) translateY(0); }
.sync-desc{ font-size:12.5px; line-height:1.6; color: var(--ink-soft); margin:0 0 10px; }
.sync-input{
  width:100%; border:1px solid var(--hairline); outline:none; background: var(--surface-2);
  font-family: var(--font); font-size:13.5px; color: var(--ink); border-radius:10px; padding:10px 12px;
  margin-bottom:10px;
  transition: border-color 140ms var(--ease);
}
.sync-input:focus{ border-color: var(--blue); }
.sync-actions{ display:flex; justify-content:flex-end; gap:8px; }
.sync-action-btn{
  border:none; cursor:pointer; font-family: var(--font); font-size:13px; font-weight:600;
  padding:9px 15px; border-radius:10px;
  transition: background 140ms var(--ease), transform 140ms var(--ease);
}
.sync-disconnect{ background: rgba(0,0,0,.06); color: var(--ink-soft); }
.sync-disconnect:hover{ background: rgba(0,0,0,.1); }
.sync-connect{ background: var(--blue); color:#fff; }
.sync-connect:hover{ transform: translateY(-1px); background:#0670e0; }
.sync-status{ font-size:11.5px; color: var(--ink-faint); margin-top:10px; min-height:14px; }

.sync-loading-overlay{
  position:fixed; inset:0; z-index:130;
  display:none; align-items:center; justify-content:center;
  background: rgba(245,245,247,.88);
  backdrop-filter: blur(6px);
}
.sync-loading-overlay.show{ display:flex; }
.sync-loading-box{ display:flex; flex-direction:column; align-items:center; gap:12px; font-size:13.5px; font-weight:600; color: var(--ink-soft); }
.sync-spinner{
  width:26px; height:26px; border-radius:50%;
  border:3px solid rgba(10,132,255,.18); border-top-color: var(--blue);
  animation: spin 800ms linear infinite;
}
@keyframes spin{ to{ transform: rotate(360deg); } }

/* ---------- project grid ---------- */
.grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
@media (max-width: 980px){ .grid{ grid-template-columns: repeat(2,1fr); } }
@media (max-width: 640px){ .grid{ grid-template-columns: 1fr; } }

.card{
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--hairline-soft);
  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 16px rgba(0,0,0,.045);
  padding: 12px 14px;
  cursor:pointer;
  display:flex; flex-direction:row; align-items:center; gap:12px;
  min-height: 0;
  transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  animation: cardIn 460ms var(--ease) both;
  touch-action:none; user-select:none; -webkit-user-select:none;
}
.grid .card:nth-child(1){ animation-delay: 30ms; }
.grid .card:nth-child(2){ animation-delay: 80ms; }
.grid .card:nth-child(3){ animation-delay: 130ms; }
.grid .card:nth-child(4){ animation-delay: 180ms; }
.grid .card:nth-child(5){ animation-delay: 230ms; }
.grid .card:nth-child(6){ animation-delay: 280ms; }
@keyframes cardIn{ from{ opacity:0; transform: translateY(10px) scale(.985); } to{ opacity:1; transform: translateY(0) scale(1);} }
.card:hover{ transform: translateY(-3px); box-shadow: 0 3px 8px rgba(0,0,0,.05), 0 12px 24px rgba(0,0,0,.07); }
.card.sort-active{
  position:relative; z-index:70;
  box-shadow: 0 24px 46px rgba(0,0,0,.22), 0 4px 10px rgba(0,0,0,.1);
  transform: scale(1.045);
  cursor:grabbing;
  transition: box-shadow 150ms var(--ease);
}
.card.sort-target{ box-shadow: inset 0 0 0 3px var(--blue), 0 4px 10px rgba(0,0,0,.06); }
.card:active{ transform: translateY(-1px) scale(.994); }

.completed-row.sort-active{
  position:relative; z-index:70; background: var(--surface);
  box-shadow: 0 16px 32px rgba(0,0,0,.16), 0 2px 6px rgba(0,0,0,.08);
  border-radius:10px; cursor:grabbing;
}
.completed-row.sort-target{ box-shadow: inset 0 0 0 2px var(--blue); border-radius:10px; }

.completed-section.drop-zone-active{
  min-height:64px; border-radius: var(--radius-lg);
  transition: background 140ms var(--ease), box-shadow 140ms var(--ease);
}
.completed-section.drop-zone-active:not(.drop-hover){
  background: rgba(0,0,0,.015);
  box-shadow: inset 0 0 0 1.5px dashed var(--hairline);
}
.completed-section.drop-zone-active.drop-hover{
  background: rgba(48,209,88,.08);
  box-shadow: inset 0 0 0 2px var(--green);
}
.completed-section.drop-zone-active:empty::before{
  content:'ここにドラッグして完了にする';
  display:flex; align-items:center; justify-content:center;
  height:64px; font-size:12.5px; font-weight:600; color: var(--ink-faint);
}

.grid.drop-zone-active{ position:relative; }
.grid.drop-zone-active::after{
  content:''; grid-column:1/-1; grid-row:1/-1;
  position:absolute; inset:-8px; border-radius: var(--radius-lg);
  pointer-events:none; transition: background 140ms var(--ease), box-shadow 140ms var(--ease);
  box-shadow: inset 0 0 0 1.5px dashed var(--hairline);
}
.grid.drop-zone-active.drop-hover::after{
  background: rgba(10,132,255,.05);
  box-shadow: inset 0 0 0 2px var(--blue);
}

/* ---------- status-based card tint (3 rule-based statuses) ---------- */
.card.st-delayed{ background: rgba(255,55,95,.12); }
.card.st-delayed:hover{ box-shadow: 0 3px 8px rgba(255,55,95,.08), 0 12px 26px rgba(255,55,95,.14); }

.card-icon{
  width:36px; height:36px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  flex:0 0 auto;
  border:none; cursor:pointer; padding:0;
  position:relative;
  color:#fff;
  transition: transform 140ms var(--ease), filter 140ms var(--ease);
}
.card-icon:hover{ transform: scale(1.06); filter: brightness(1.06); }
.card-icon svg{ width:19px; height:19px; pointer-events:none; }
.card-icon::after{
  content:"";
  position:absolute; inset:-3px;
  border-radius:12px;
  box-shadow: 0 0 0 2px rgba(0,0,0,0);
  transition: box-shadow 140ms var(--ease);
}
.card-icon:hover::after{ box-shadow: 0 0 0 2px rgba(0,0,0,.08); }

/* ---------- Pokémon-style HP bar (percentage indicator) ---------- */
.hp-track{
  position:relative; width:100%; background: rgba(0,0,0,.09);
  border-radius:999px; overflow:hidden;
}
.hp-fill{
  height:100%; width:0%; border-radius:999px;
  transition: width 900ms var(--ease), background 300ms var(--ease);
  position:relative;
}
.hp-fill::after{
  content:""; position:absolute; inset:0 0 55% 0;
  background: rgba(255,255,255,.32);
  border-radius:999px 999px 0 0;
}
.hp-green{ background:#42c766; }
.hp-yellow{ background:#f0b429; }
.hp-blue{ background:#4f9dff; }
.hp-red{ background:#ff5a5f; }
.hp-darkred{ background:#8a1f2b; }
.hp-empty{ background:transparent; }
.hp-track-empty{
  background-color: rgba(0,0,0,.06);
  background-image: none;
}

.hp-mini{ display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex:0 0 auto; width:58px; }
.hp-mini .hp-pct{
  font-size:12.5px; font-weight:800; letter-spacing:-0.02em; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.hp-mini .hp-track{ width:100%; height:7px; box-shadow: inset 0 0 0 1.5px rgba(0,0,0,.07); }
.xp-track{
  width:100%; height:4px; background: rgba(0,0,0,.09);
  border-radius:999px; overflow:hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
}
.xp-track.xp-track-empty{
  background-color: rgba(0,0,0,.06);
  background-image: none;
}
.xp-fill{
  height:100%; width:0%; border-radius:999px; background:#4f9dff;
  transition: width 900ms var(--ease);
}

.card-body{ flex:1; min-width:0; align-self:flex-start; display:flex; flex-direction:column; justify-content:flex-start; gap:0; margin-top:-1px; }

.card-title-row{ display:flex; align-items:center; gap:5px; line-height:1; }
.card-title{
  font-size:14px; font-weight:700; letter-spacing:-0.01em; color: var(--ink); cursor:text;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.card-title-input{
  font-family: var(--font); font-size:14px; font-weight:700; letter-spacing:-0.01em; color: var(--ink);
  border:none; outline:none; background: rgba(0,0,0,.045); border-radius:6px; padding:1px 5px; width:100%;
}
.title-edit-btn{
  flex:0 0 auto; width:14px; height:14px; border:none; background:transparent; cursor:pointer;
  color: var(--ink-faint); opacity:0; transition: opacity 140ms var(--ease), color 140ms var(--ease);
  display:flex; align-items:center; justify-content:center; padding:0;
}
.card:hover .title-edit-btn{ opacity:1; }
.title-edit-btn:hover{ color: var(--blue); }
.title-edit-btn svg{ width:11px; height:11px; }

.status-pill{
  flex:0 0 auto;
  align-self:flex-start;
  font-size:9.5px; font-weight:600;
  padding:1.5px 8px;
  border-radius:999px;
  white-space:nowrap;
  line-height:1.3;
  margin-top:-4px;
}

/* ---------- accent color utilities ---------- */
.acc-blue    .card-icon{ background: var(--blue); }
.acc-green   .card-icon{ background: var(--green); }
.acc-pink    .card-icon{ background: var(--pink); }
.acc-gray    .card-icon{ background: var(--gray); }
.acc-orange  .card-icon{ background: var(--orange); }
.acc-purple  .card-icon{ background: var(--purple); }

/* ---------- status-based pill colors (3 rule-based statuses) ---------- */
.status-pill.st-ontrack{ background: rgba(48,209,88,.14);  color: #1f8a43; }
.status-pill.st-ahead{   background: rgba(10,132,255,.13); color: #0864c9; }
.status-pill.st-delayed{ background: rgba(255,55,95,.14);  color: #d02348; }

.pulse-update{ animation: pulseUpdate 420ms var(--ease); }
@keyframes pulseUpdate{ 0%{ transform:scale(1);} 40%{ transform:scale(1.015);} 100%{ transform:scale(1);} }

/* ---------- icon picker popover ---------- */
.icon-popover{
  position:fixed; z-index:90;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid var(--hairline);
  border-radius: 16px;
  box-shadow: 0 16px 40px rgba(0,0,0,.18);
  padding:10px;
  display:none;
  opacity:0; transform: scale(.94) translateY(-4px);
  transition: opacity 160ms var(--ease), transform 160ms var(--ease);
}
.icon-popover.open{ display:block; opacity:1; transform: scale(1) translateY(0); }
.icon-popover-grid{ display:grid; grid-template-columns: repeat(4, 34px); gap:6px; }
.icon-swatch{
  width:34px; height:34px; border-radius:10px; border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background: rgba(0,0,0,.05);
  color: var(--ink-soft);
  transition: transform 120ms var(--ease), background 120ms var(--ease), color 120ms var(--ease);
}
.icon-swatch:hover{ transform: scale(1.08); background: rgba(0,0,0,.09); }
.icon-swatch.selected{ background: var(--swatch-accent, var(--blue)); color:#fff; }
.icon-swatch svg{ width:17px; height:17px; }

/* ---------- freely-selectable icon color ---------- */
.color-swatch-row{ display:grid; grid-template-columns: repeat(4, 34px); gap:6px; justify-items:center; align-items:center; }
.color-swatch{
  width:26px; height:26px; border-radius:50%; border:2px solid rgba(0,0,0,.06); cursor:pointer; padding:0;
  transition: transform 120ms var(--ease), box-shadow 120ms var(--ease);
}
.color-swatch:hover{ transform: scale(1.14); }
.color-swatch.selected{ box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink); }
.color-swatch-custom{
  position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
  background: conic-gradient(from 0deg, #ff3b30, #ff9500, #ffcc00, #34c759, #00c7be, #30b0ff, #5856d6, #af52de, #ff2d55, #ff3b30);
}
.color-native-input{ position:absolute; inset:-6px; width:calc(100% + 12px); height:calc(100% + 12px); opacity:0; cursor:pointer; border:none; padding:0; }

/* ---------- click-to-edit item popover (milestones / timeline / to-do items) ---------- */
.item-popover{
  position:fixed; z-index:95;
  width:min(280px, calc(100vw - 24px));
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid var(--hairline);
  border-radius: 16px;
  box-shadow: 0 18px 44px rgba(0,0,0,.2);
  padding:14px;
  display:none;
  opacity:0; transform: scale(.94) translateY(-4px);
  transition: opacity 160ms var(--ease), transform 160ms var(--ease);
}
.item-popover.open{ display:block; opacity:1; transform: scale(1) translateY(0); }
.pop-label{ font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color: var(--ink-faint); margin:0 0 5px; }
.pop-label:not(:first-child){ margin-top:12px; }
.pop-input{
  width:100%; border:1px solid var(--hairline); outline:none; background: var(--surface-2);
  font-family: var(--font); font-size:14px; color: var(--ink); border-radius:9px; padding:9px 11px;
  transition: border-color 140ms var(--ease);
}
.pop-input:focus{ border-color: var(--blue); }
.pop-tabbar{ display:flex; gap:4px; padding:3px; margin-bottom:10px; background: rgba(118,118,128,.12); border-radius:9px; }
.pop-tab-btn{
  flex:1; font-family: var(--font); font-size:11.5px; font-weight:600;
  padding:6px 8px; border:none; cursor:pointer; border-radius:7px;
  background:transparent; color: var(--ink-soft);
  transition: background 140ms var(--ease), color 140ms var(--ease), box-shadow 140ms var(--ease);
}
.pop-tab-btn.active{ background:#fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
.pop-tab-panel{ display:none; }
.pop-tab-panel.active{ display:block; }
.pop-textarea{ resize:vertical; min-height:80px; line-height:1.5; }
.pop-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; }
.pop-btn{ border:none; cursor:pointer; font-family: var(--font); font-size:13px; font-weight:600; padding:8px 14px; border-radius:9px; transition: background 140ms var(--ease), transform 140ms var(--ease); }
.pop-btn-del{ background: rgba(255,55,95,.1); color: var(--pink); }
.pop-btn-del:hover{ background: rgba(255,55,95,.18); }
.pop-btn-done{ background: var(--ink); color:#fff; }
.pop-btn-done:hover{ transform: translateY(-1px); background: var(--blue); }

/* ---------- display-mode rows (tap to edit, long-press to reorder) ---------- */
.edit-row{
  cursor:pointer; transition: background 140ms var(--ease);
  touch-action:none; user-select:none; -webkit-user-select:none;
}
.edit-row:hover{ background: rgba(10,132,255,.05); }
.edit-row-main{ flex:1; min-width:0; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.edit-row-title{ font-size:13.5px; font-weight:500; color: var(--ink); }
.edit-row-title.done{ color: var(--ink-faint); text-decoration: line-through; }
.edit-row-date{
  font-size:11.5px; font-weight:600; color: var(--ink-faint); flex:0 0 auto;
  padding:2px 7px; border-radius:7px; border:1.5px solid transparent;
  transition: border-color 140ms var(--ease), color 140ms var(--ease), background 140ms var(--ease);
}
.edit-row-date:hover{ border-color: var(--blue); color: var(--blue); background: rgba(10,132,255,.06); }
.quad-text{ cursor:text; }
.quad-item:hover{ background: rgba(255,255,255,.95); }
.quad-item{ touch-action:none; user-select:none; -webkit-user-select:none; }

/* ---------- long-press pop-out + drag-to-reorder ---------- */
.edit-row.sort-active, .quad-item.sort-active, .ms-item-wrap.sort-active{
  position:relative; z-index:70;
  background:#fff;
  box-shadow: 0 16px 32px rgba(0,0,0,.2), 0 2px 6px rgba(0,0,0,.1);
  transform: scale(1.035);
  transition: box-shadow 150ms var(--ease), transform 150ms var(--ease);
  cursor:grabbing;
}
.edit-row.sort-shift, .quad-item.sort-shift, .ms-item-wrap.sort-shift{ transition: transform 180ms var(--ease); }
.reorder-hint{
  position:fixed; z-index:96;
  background: var(--ink); color:#fff;
  font-size:12px; font-weight:600;
  padding:8px 14px; border-radius:999px;
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
  opacity:0; pointer-events:none;
  transition: opacity 160ms var(--ease);
}
.reorder-hint.show{ opacity:1; }

/* ---------- custom confirm dialog (native confirm() is blocked in sandboxed previews) ---------- */
.confirm-overlay{
  position:fixed; inset:0; z-index:110;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  opacity:0; pointer-events:none;
  transition: opacity 180ms var(--ease);
}
.confirm-overlay.open{ opacity:1; pointer-events:auto; }
.confirm-scrim{ position:absolute; inset:0; background: rgba(20,20,22,.42); backdrop-filter: blur(4px); }
.confirm-box{
  position:relative;
  width:min(340px, 100%);
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(24px) saturate(1.4);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.6);
  box-shadow: 0 24px 60px rgba(0,0,0,.28);
  padding:22px 20px 18px;
  transform: scale(.94) translateY(10px);
  transition: transform 220ms var(--ease);
}
.confirm-overlay.open .confirm-box{ transform: scale(1) translateY(0); }
.confirm-msg{ font-size:14px; line-height:1.7; color: var(--ink); white-space:pre-line; margin-bottom:18px; }
.confirm-actions{ display:flex; justify-content:flex-end; gap:8px; }
.confirm-btn{
  border:none; cursor:pointer; font-family: var(--font); font-size:13.5px; font-weight:600;
  padding:9px 16px; border-radius:10px;
  transition: background 140ms var(--ease), transform 140ms var(--ease);
}
.confirm-cancel{ background: rgba(0,0,0,.06); color: var(--ink-soft); }
.confirm-cancel:hover{ background: rgba(0,0,0,.1); }
.confirm-ok{ background: var(--pink); color:#fff; }
.confirm-ok:hover{ transform: translateY(-1px); background:#e0244a; }

@media (max-width:480px){
  .edit-add-row, .quad-add-row{ flex-wrap:wrap; }
  .edit-add-input.date{ flex:1 1 90px; }
  .edit-add-input.grow{ flex:1 1 100%; order:-1; }
}

/* =========================================================
   DETAIL OVERLAY
   ========================================================= */
.overlay{
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  opacity:0; pointer-events:none;
  transition: opacity var(--dur) var(--ease);
}
.overlay.open{ opacity:1; pointer-events:auto; }
.overlay-scrim{ position:absolute; inset:0; background: rgba(20,20,22,.42); backdrop-filter: blur(6px); }

.dialog{
  position:relative;
  width:min(880px, 100%);
  max-height:88vh;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(28px) saturate(1.4);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,.6);
  box-shadow: 0 30px 80px rgba(0,0,0,.28);
  display:flex; flex-direction:column;
  transform: scale(.94) translateY(16px);
  opacity:0;
  transition: transform 320ms var(--ease), opacity 320ms var(--ease);
  overflow:hidden;
}
.overlay.open .dialog{ transform: scale(1) translateY(0); opacity:1; }

.dialog-head{ display:flex; align-items:center; gap:14px; padding:24px 28px 16px; }
.dialog-icon{
  width:46px; height:46px; border-radius:14px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  border:none; cursor:pointer; padding:0; position:relative;
  color:#fff;
  transition: transform 140ms var(--ease), filter 140ms var(--ease);
}
.dialog-icon:hover{ transform: scale(1.05); filter: brightness(1.06); }
.dialog-icon svg{ width:24px; height:24px; pointer-events:none; }
.dialog-title-row{ display:flex; align-items:center; gap:8px; margin:0 0 4px; }
.dialog-titles h2{ font-size:20px; font-weight:800; letter-spacing:-0.01em; margin:0; cursor:text; }
.dialog-title-input{
  font-family: var(--font); font-size:20px; font-weight:800; letter-spacing:-0.01em; color: var(--ink);
  border:none; outline:none; background: rgba(0,0,0,.045); border-radius:8px; padding:3px 8px;
}
.dialog-title-edit-btn{
  flex:0 0 auto; width:22px; height:22px; border:none; background:transparent; cursor:pointer;
  color: var(--ink-faint); transition: color 140ms var(--ease);
  display:flex; align-items:center; justify-content:center; padding:0;
}
.dialog-title-edit-btn:hover{ color: var(--blue); }
.dialog-title-edit-btn svg{ width:14px; height:14px; }
.dialog-titles p{ margin:0; font-size:13px; color: var(--ink-soft); font-weight:500; }
.dialog-head-actions{ margin-left:auto; display:flex; align-items:center; gap:6px; }
.complete-project-btn{
  width:30px; height:30px; border-radius:50%;
  border:none; cursor:pointer;
  background: rgba(0,0,0,.06);
  color: var(--ink-soft);
  display:flex; align-items:center; justify-content:center;
  transition: background 160ms var(--ease), color 160ms var(--ease);
}
.complete-project-btn:hover{ background: rgba(48,209,88,.15); color: var(--green); }
.complete-project-btn.is-completed{ background: rgba(48,209,88,.15); color: var(--green); }
.complete-project-btn svg{ width:15px; height:15px; }
.delete-project-btn{
  width:30px; height:30px; border-radius:50%;
  border:none; cursor:pointer;
  background: rgba(0,0,0,.06);
  color: var(--ink-soft);
  display:flex; align-items:center; justify-content:center;
  transition: background 160ms var(--ease), color 160ms var(--ease);
}
.delete-project-btn:hover{ background: rgba(255,55,95,.13); color: var(--pink); }
.delete-project-btn svg{ width:15px; height:15px; }
.close-btn{
  width:30px; height:30px; border-radius:50%;
  border:none; cursor:pointer;
  background: rgba(0,0,0,.06);
  color: var(--ink-soft);
  font-size:14px; font-weight:600;
  display:flex; align-items:center; justify-content:center;
  transition: background 160ms var(--ease), transform 160ms var(--ease), color 160ms var(--ease);
}
.close-btn:hover{ background: rgba(0,0,0,.1); color: var(--ink); transform: rotate(90deg); }

/* ---------- empty project slot (frame remains after deletion) ---------- */
.card.is-empty{
  flex-direction:column; align-items:center; justify-content:center;
  gap:8px;
  background: transparent;
  border: 1.5px dashed var(--hairline);
  box-shadow:none;
  padding:18px 14px;
}
.card.is-empty:hover{ border-color: var(--ink-faint); background: rgba(0,0,0,.015); box-shadow:none; }
.empty-slot-icon{
  width:30px; height:30px; border-radius:50%;
  border:1.5px dashed var(--hairline);
  display:flex; align-items:center; justify-content:center;
  color: var(--ink-faint);
}
.empty-slot-icon svg{ width:16px; height:16px; }

/* ---------- add project tile ---------- */
.add-project-tile{
  grid-column: 1 / -1;
  flex-direction:row; align-items:center; justify-content:center;
  gap:6px; background: transparent; border: 1.5px dashed var(--hairline);
  box-shadow:none; padding:10px; margin-top:2px; min-height:0; height:38px;
  cursor:pointer; opacity:.6;
  font-family: var(--font); color: var(--ink-faint);
  transition: border-color 140ms var(--ease), background 140ms var(--ease), color 140ms var(--ease), opacity 140ms var(--ease);
}
.add-project-tile:hover{ opacity:1; border-color: var(--blue); background: rgba(10,132,255,.04); color: var(--blue); }
.add-project-tile svg{ width:14px; height:14px; }
.add-project-tile span{ font-size:11px; font-weight:600; }

/* ---------- divider before the 7th+ project ---------- */
.grid-extra-divider{
  grid-column: 1 / -1;
  display:flex; align-items:center; gap:10px;
  margin:4px 2px -2px;
}
.grid-extra-divider::before, .grid-extra-divider::after{
  content:''; flex:1; height:0; border-top:1.5px dashed var(--hairline);
}
.grid-extra-divider span{
  font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
  color: var(--ink-faint); white-space:nowrap;
}

/* ---------- completed projects archive ---------- */
.completed-section{ margin: 28px 28px 20px; }
.completed-divider{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.completed-divider::before, .completed-divider::after{
  content:''; flex:1; height:0; border-top:1.5px dashed var(--hairline);
}
.completed-divider span{
  font-size:10.5px; font-weight:700; letter-spacing:.08em;
  color: var(--ink-faint); white-space:nowrap;
}
.completed-list{ display:flex; flex-direction:column; gap:2px; }
.completed-row{
  display:flex; align-items:center; gap:10px; padding:9px 10px;
  border-radius:10px; cursor:pointer;
  transition: background 140ms var(--ease);
}
.completed-row:hover{ background: rgba(0,0,0,.03); }
.completed-row-icon{
  flex:0 0 auto; width:26px; height:26px; border-radius:8px;
  display:flex; align-items:center; justify-content:center; color:#fff;
  opacity:.7;
}
.completed-row-icon svg{ width:14px; height:14px; }
.completed-row-title{
  flex:1; min-width:0; font-size:13.5px; font-weight:500; color: var(--ink-soft);
  text-decoration: line-through; text-decoration-color: var(--hairline);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.completed-row-check{ flex:0 0 auto; width:15px; height:15px; color: var(--green); }

/* segmented tab control */
.tab-bar{
  display:flex; gap:2px; flex-wrap:wrap;
  margin: 0 28px 4px;
  padding:4px;
  background: rgba(118,118,128,.12);
  border-radius: 22px;
}
.tab-btn{
  flex:1 1 auto;
  font-size:12.5px; font-weight:600;
  padding:8px 10px;
  cursor:pointer;
  border-radius: 18px;
  border:1px solid rgba(0,0,0,.05);
  background: rgba(255,255,255,.45);

/* Time HP — not an achievement rate. It reflects how urgent the nearest
   upcoming (or most overdue) unfinished milestone is. Nothing pending
   soon reads as healthy; a blown deadline reads as critical, no matter
   how much other work is done. Boundaries below extend the "5+ days
   overdue" floor downward through longer overdue stretches too, since
   HP dropping back up the longer something is overdue wouldn't make sense. */
function timeHPFromDays(daysUntil){
  if(daysUntil >= 15) return { hp:90, tier:'green' };
  if(daysUntil >= 8)  return { hp:80, tier:'green' };
  if(daysUntil >= 4)  return { hp:60, tier:'yellow' };
  if(daysUntil >= 2)  return { hp:50, tier:'yellow' };
  if(daysUntil === 1) return { hp:40, tier:'yellow' };
  if(daysUntil === 0) return { hp:30, tier:'yellow' };
  if(daysUntil >= -2) return { hp:20, tier:'red' };
  if(daysUntil === -3) return { hp:10, tier:'red' };
  return { hp:0, tier:'darkred' }; // 4+ days overdue
}

function hpMiniHTML(lvPct, hpResult){
  const hp = hpResult ? hpResult.hp : null;
  const tier = hpResult ? hpResult.tier : 'empty';
  const target = hp === null ? 0 : hp;
  return `
    <div class="hp-mini">
      <div class="hp-pct">${lvLabel(lvPct)}</div>
      <div class="hp-track${hp===null?' hp-track-empty':''}">
        <div class="hp-fill hp-${tier}" style="width:0%" data-target="${target}"></div>
      </div>
      <div class="xp-track${lvPct===null?' xp-track-empty':''}">
        <div class="xp-fill" style="width:0%" data-target="${lvPct===null?0:lvPct}"></div>
      </div>
    </div>
  `;
}

const QUAD_KEY = 'projects_quadrant_state_v2';
const QUAD_DEFS = [
  { id:'q1', label:'NOW',   sub:'緊急かつ重要' },
  { id:'q2', label:'GROW',  sub:'重要だけど緊急じゃない' },
  { id:'q3', label:'QUICK', sub:'緊急だけど重要じゃない' },
  { id:'q4', label:'LATER', sub:'緊急でも重要でもない' },
];
const QUAD_WEIGHT = { q1:4, q2:3, q3:2, q4:1 };
const WEIGHT_TO_QUAD = { 4:'q1', 3:'q2', 2:'q3', 1:'q4' };
// how far along a project "should" be, given its status — the same
// judgment used to color-code Delayed/On Track/Ahead of Schedule.
const STATUS_EXPECTED_PCT = { 'Ahead of Schedule':90, 'On Track':55, 'Delayed':20 };
function itemWeight(it){ return typeof it.weight === 'number' ? it.weight : 2; }

function loadQuadState(){
  try{ const raw = localStorage.getItem(QUAD_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return {};
}
function saveQuadState(state){ try{ localStorage.setItem(QUAD_KEY, JSON.stringify(state)); }catch(e){} }

let uidCounter = 1;
function nextUid(){ return 'i' + (uidCounter++) + '-' + Date.now().toString(36); }

function defaultQuadrantsFor(p){
  const buckets = { q1:[], q2:[], q3:[], q4:[], completed:[] };
  const map = { high:'q1', mid:'q2', low:'q3' };
  const ratio = (STATUS_EXPECTED_PCT[p.status] ?? 50) / 100;
  const doneCount = Math.round(p.tasks.length * ratio);
  p.tasks.forEach((t,i)=>{
    const q = map[t.p] || 'q3';
    buckets[q].push({ id: nextUid(), text: t.n, done: i < doneCount, weight: QUAD_WEIGHT[q] });
  });
  return buckets;
}

let quadState = loadQuadState();
PROJECTS.forEach(p=>{
  const s = quadState[p.id];
  if(!s || !s.q1 || !s.q2 || !s.q3 || !s.q4){
    quadState[p.id] = defaultQuadrantsFor(p);
  } else {
    // migrate older saved data: add the completed bucket and per-item weights if missing
    if(!s.completed) s.completed = [];
    ['q1','q2','q3','q4'].forEach(qid=>{
      s[qid].forEach(it=>{ if(typeof it.weight !== 'number') it.weight = QUAD_WEIGHT[qid]; });
    });
    s.completed.forEach(it=>{ if(typeof it.weight !== 'number') it.weight = 2; });
  }
});
saveQuadState(quadState);

function quadCounts(id){
  const s = quadState[id];
  const all = [...s.q1, ...s.q2, ...s.q3, ...s.q4, ...s.completed];
  return { done: all.filter(i=>i.done).length, total: all.length };
}
// Lv. is weighted by which area a task belongs (or belonged) to:
// Now counts 4x, Grow 3x, Quick 2x, Later 1x — so finishing higher-priority
// work moves the needle more, while 100% completion always still reads Lv.100.
// Lv. is To Do-only. The HP bar is a separate metric driven by milestones —
// the two numbers are intentionally independent, like a game character's
// Level vs. their current HP.
function quadProgress(id){
  const s = quadState[id];
  const todos = [...s.q1, ...s.q2, ...s.q3, ...s.q4, ...s.completed];
  if(todos.length === 0) return null;
  let totalW = 0, doneW = 0;
  todos.forEach(it=>{
    const w = itemWeight(it);
    totalW += w;
    if(it.done) doneW += w;
  });
  if(totalW === 0) return null;
  return Math.round((doneW/totalW)*100);
}
// Time HP looks at the single nearest unfinished milestone (soonest
// upcoming, or most overdue if any are already past due) and maps its
// distance from today through the table above. No milestones pending
// at all reads as the best possible state — "Ahead of Schedule".
function milestoneProgress(id){
  const items = (typeof milestoneState !== 'undefined' && milestoneState[id]) || [];
  if(items.length === 0) return null;

  const today = new Date();
  today.setHours(0,0,0,0);

  let nearestDays = null;
  items.forEach(m=>{
    if(m.done || !isISODate(m.date)) return;
    const [y,mo,d] = m.date.split('-').map(Number);
    const due = new Date(y, mo-1, d);
    const days = Math.round((due - today) / 86400000);
    if(nearestDays === null || days < nearestDays) nearestDays = days;
  });

  if(nearestDays === null || nearestDays > 21) return { hp:100, tier:'green' };
  return timeHPFromDays(nearestDays);
}
function lvLabel(pct){ return pct === null ? '–' : 'Lv.' + (pct === 0 ? 1 : pct); }

/* =========================================================
   PROJECT DELETION — the card frame stays in the grid, but
   all of its content (title, icon, tasks, notes, timeline,
   milestones) is cleared. Setting a new title later revives it.
   ========================================================= */
const EMPTY_SLOT_LABEL = '';

function isProjectDeleted(id){
  return !!(projectMeta[id] && projectMeta[id].deleted);
}

function deleteProjectContents(id){
  const idx = PROJECTS.findIndex(x=>x.id===id);
  if(idx === -1) return;
  const p = PROJECTS[idx];

  if(milestoneState[id]) delete milestoneState[id];
  if(timelineState[id]) delete timelineState[id];
  if(quadState[id]) delete quadState[id];
  saveMilestoneState(milestoneState);
  saveTimelineState(timelineState);
  saveQuadState(quadState);

  if(p.custom){
    // custom (7th+) projects have no fixed slot to preserve — remove entirely
    PROJECTS.splice(idx, 1);
    delete projectMeta[id];
    saveMeta(projectMeta);
    saveCustomProjects();
  } else {
    // one of the original 6 — clear contents but keep the revivable empty slot
    p.title = EMPTY_SLOT_LABEL;
    p.icon = 'globe';
    projectMeta[id] = { deleted:true, title:EMPTY_SLOT_LABEL, icon:'globe', summary:'', notes:'' };
    saveMeta(projectMeta);
    milestoneState[id] = [];
    timelineState[id] = [];
    quadState[id] = { q1:[], q2:[], q3:[], q4:[], completed:[] };
    saveMilestoneState(milestoneState);
    saveTimelineState(timelineState);
    saveQuadState(quadState);
  }

  renderGrid();
}

function isProjectCompleted(id){
  return !!(projectMeta[id] && projectMeta[id].completed);
}
function setProjectCompleted(id, val){
  projectMeta[id] = { ...(projectMeta[id]||{}), completed: val };
  saveMeta(projectMeta);
  renderGrid();
}

function createNewProject(){

const ORDER_KEY = 'projects_order_v1';
function loadOrder(){
  try{ const raw = localStorage.getItem(ORDER_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
function saveOrder(){
  try{ localStorage.setItem(ORDER_KEY, JSON.stringify(PROJECTS.map(p=>p.id))); }catch(e){}
}
(function applyStoredOrder(){
  const order = loadOrder();
  if(!order) return;
  const byId = new Map(PROJECTS.map(p=>[p.id,p]));
  const ordered = order.map(id=>byId.get(id)).filter(Boolean);
  order.forEach(id=>byId.delete(id));
  const remaining = PROJECTS.filter(p=>byId.has(p.id));
  PROJECTS.length = 0;
  PROJECTS.push(...ordered, ...remaining);
})();

};
function statusRule(status){ return STATUS_RULES[status] || STATUS_RULES['On Track']; }

// The status tag is no longer a fixed field — it's derived live from HP
// (the nearest-milestone urgency): green = Ahead of Schedule, yellow =
// On Track, red/dark red = Delayed.
function statusFromHPTier(tier){
  if(tier === 'green') return 'Ahead of Schedule';
  if(tier === 'yellow') return 'On Track';
  if(tier === 'red' || tier === 'darkred') return 'Delayed';
  return 'On Track';
}

   MILESTONES (state only) — moved ahead of renderGrid() since
   milestoneProgress() reads milestoneState for the HP bar.
   ========================================================= */
const MILESTONE_KEY = 'projects_milestones_v1';
const MONTH_ABBR = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function isISODate(str){ return typeof str === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(str); }
function parseLooseDateToISO(str, assumedYear){
  if(!str) return '';
  if(isISODate(str)) return str;
  const m = str.trim().match(/^([A-Za-z]{3})[a-z]*\s+(\d{1,2})/);
  if(m && MONTH_ABBR[m[1]] !== undefined){
    const mo = MONTH_ABBR[m[1]];
    const day = parseInt(m[2],10);
    const y = assumedYear || new Date().getFullYear();
    return `${y}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }
  return '';
}
function formatISODate(iso){
  if(!isISODate(iso)) return iso || '';
  const [y,mo,d] = iso.split('-').map(Number);
  return `${MONTH_NAMES[mo-1].slice(0,3)} ${d}`;
}

function loadMilestoneState(){
  try{ const raw = localStorage.getItem(MILESTONE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return {};
}
function saveMilestoneState(state){ try{ localStorage.setItem(MILESTONE_KEY, JSON.stringify(state)); }catch(e){} }
function defaultMilestonesFor(p){
  return (p.milestones||[]).map(m=>({ id: nextUid(), text: m.t, date: parseLooseDateToISO(m.d, 2026), done: !!m.done }));
}

    milestoneState[p.id] = defaultMilestonesFor(p);
  } else {
    milestoneState[p.id].forEach(it=>{
      if(it.date && !isISODate(it.date)) it.date = parseLooseDateToISO(it.date, 2026);
    });
  }
});

/* ---------- custom confirm dialog (native confirm()/alert() are blocked in sandboxed previews) ---------- */
const confirmOverlay = document.getElementById('confirmOverlay');
const confirmScrim = document.getElementById('confirmScrim');
const confirmMsg = document.getElementById('confirmMsg');
const confirmOkBtn = document.getElementById('confirmOkBtn');
const confirmCancelBtn = document.getElementById('confirmCancelBtn');

function customConfirm(message){
  return new Promise(resolve=>{
    confirmMsg.textContent = message;
    confirmOverlay.classList.add('open');

    function cleanup(result){
      confirmOverlay.classList.remove('open');
      confirmOkBtn.removeEventListener('click', onOk);
      confirmCancelBtn.removeEventListener('click', onCancel);
      confirmScrim.removeEventListener('click', onCancel);
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onOk(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    function onKey(e){ if(e.key === 'Escape') cleanup(false); }

    confirmOkBtn.addEventListener('click', onOk);
    confirmCancelBtn.addEventListener('click', onCancel);
    confirmScrim.addEventListener('click', onCancel);
    document.addEventListener('keydown', onKey);
  });
}

function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

dialogBody.addEventListener('click', (e)=>{
  const addBtn = e.target.closest('[data-action="add"]');
  const toggleBtn = e.target.closest('[data-action="toggle"]');
  const delBtn = e.target.closest('[data-action="delete-direct"]');
  const completeBtn = e.target.closest('[data-action="complete-direct"]');
  const editTrigger = e.target.closest('[data-action="edit-inline"]');
  if(!addBtn && !toggleBtn && !delBtn && !completeBtn && !editTrigger) return;

  const panelEl = e.target.closest('.quad-panel');
  if(!panelEl) return;
  const id = panelEl.dataset.project;

  if(addBtn){
    const qid = panelEl.dataset.quad;
    if(!qid) return;
    const input = panelEl.querySelector('.quad-add-input');
    const text = input.value.trim();
    if(!text) return;
    quadState[id][qid].push({ id: nextUid(), text, done:false, weight: QUAD_WEIGHT[qid] });
    saveQuadState(quadState);
    refreshQuadrantTab(id);
    const newInput = dialogBody.querySelector(`.quad-panel[data-quad="${qid}"] .quad-add-input`);
    if(newInput) newInput.focus();
    return;
  }
  if(toggleBtn){
    const itemEl = e.target.closest('.quad-item');
    const qid = itemEl.dataset.quad;
    const arr = quadState[id][qid];
    const idx = arr ? arr.findIndex(i=>i.id===itemEl.dataset.item) : -1;
    if(idx > -1){
      const item = arr[idx];
      if(qid === 'completed' && item.done){
        // unchecking inside Completed — send it back to the quadrant its weight came from
        const targetQid = WEIGHT_TO_QUAD[item.weight] || 'q3';
        const [moved] = arr.splice(idx, 1);
        moved.done = false;
        quadState[id][targetQid].push(moved);
      } else {
        item.done = !item.done;
      }
      saveQuadState(quadState);
      refreshQuadrantTab(id);
    }
    return;
  }
  if(completeBtn){
    const itemEl = e.target.closest('.quad-item');
    const qid = itemEl.dataset.quad;
    const arr = quadState[id][qid];
    if(arr && qid !== 'completed'){
      const idx = arr.findIndex(i=>i.id===itemEl.dataset.item);
      if(idx > -1){
        const [moved] = arr.splice(idx, 1);
        moved.done = true; // weight stays frozen from its last active quadrant
        quadState[id].completed.push(moved);
        saveQuadState(quadState);
        logCompletionToTimeline(id, moved.text, moved.weight);
        refreshQuadrantTab(id);
      }
    }
    return;
  }
  if(delBtn){
    const itemEl = e.target.closest('.quad-item');
    const qid = itemEl.dataset.quad;
    if(quadState[id][qid]){
      quadState[id][qid] = quadState[id][qid].filter(i=>i.id!==itemEl.dataset.item);
      saveQuadState(quadState);
      refreshQuadrantTab(id);
    }
    return;
  }
  if(editTrigger){
    const itemEl = e.target.closest('.quad-item');
    const qid = itemEl.dataset.quad;
    startQuadInlineEdit(editTrigger, id, qid, itemEl.dataset.item);
    return;
  }
});
dialogBody.addEventListener('keydown', (e)=>{
  if(e.key==='Enter' && e.target.classList.contains('quad-add-input')){
    e.preventDefault();
    e.target.closest('.quad-panel').querySelector('[data-action="add"]').click();
  }
});

function buildMilestoneCalendarHTML(id, view){
  const items = milestoneState[id] || [];
  const { year, month } = view;
  const firstWeekday = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const byDay = {};
  items.forEach(it=>{
    if(!isISODate(it.date)) return;
    const [y,mo,d] = it.date.split('-').map(Number);
    if(y===year && mo-1===month){
      (byDay[d] = byDay[d] || []).push(it);
    }
  });

  const today = new Date();
  let cells = '';
  for(let i=0;i<firstWeekday;i++) cells += `<div class="cal-cell cal-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dayItems = byDay[d] || [];
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    cells += `
      <div class="cal-cell${dayItems.length?' has-items':''}${isToday?' is-today':''}" data-day="${d}">
        <span class="cal-daynum">${d}</span>
        ${dayItems.length ? `<div class="cal-dots">${dayItems.slice(0,3).map(it=>`<span class="cal-dot${it.done?' done':''}"></span>`).join('')}</div>` : ''}
      </div>
    `;
  }

  return `
    <div class="cal-wrap" data-project="${id}">
      <div class="cal-nav">
        <button class="cal-nav-btn" type="button" data-action="cal-prev">‹</button>
        <div class="cal-month-label">${MONTH_NAMES[month]} ${year}</div>
        <button class="cal-nav-btn" type="button" data-action="cal-next">›</button>
      </div>
      <div class="cal-weekdays">${['S','M','T','W','T','F','S'].map(w=>`<div class="cal-weekday">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
  `;
}

/* ---------- live refresh helpers ---------- */
function refreshOverviewStatsOnly(id){
  const panel = dialogBody.querySelector('.tab-panel[data-tab="Overview"]');
  if(!panel) return;
  const p = PROJECTS.find(x=>x.id===id);
  const lvPct = quadProgress(id);
  const hpResult = milestoneProgress(id);
  const { done: msDone, total: msTotal } = milestoneCounts(id);
  const { done: qDone, total: qTotal } = quadCounts(id);

  const lvBox = panel.querySelector('.lv-progress');
  if(lvBox){
    const fill = lvBox.querySelector('.hp-fill');
    const track = lvBox.querySelector('.hp-track');
    const pct = lvBox.querySelector('.t1-num');
    const stat = lvBox.querySelector('.stat-inline .num');
    if(fill) fill.style.width = (lvPct === null ? 0 : lvPct) + '%';
    if(track) track.classList.toggle('hp-track-empty', lvPct === null);
    if(pct) pct.textContent = lvLabel(lvPct);
    if(stat) stat.textContent = `${qDone}/${qTotal}`;
    let hint = lvBox.querySelector('.big-progress-text');
    if(lvPct === null && !hint){
      lvBox.insertAdjacentHTML('beforeend', `<div class="big-progress-text"><div class="t2">Add to-dos to start tracking Level</div></div>`);
    } else if(lvPct !== null && hint){
      hint.remove();
    }
  }

  const hpBox = panel.querySelector('.hp-progress');
  if(hpBox){
    const hp = hpResult ? hpResult.hp : null;
    const tier = hpResult ? hpResult.tier : 'empty';
    const fill = hpBox.querySelector('.hp-fill');
    const track = hpBox.querySelector('.hp-track');
    const pct = hpBox.querySelector('.t1-num');
    const stat = hpBox.querySelector('.stat-inline .num');
    if(fill){
      fill.className = `hp-fill hp-${tier}`;
      fill.style.width = (hp === null ? 0 : hp) + '%';
    }
    if(track) track.classList.toggle('hp-track-empty', hp === null);
    if(pct) pct.textContent = `HP ${hp === null ? '–' : hp + '%'}`;
    if(stat) stat.textContent = `${msDone}/${msTotal}`;
    let hint = hpBox.querySelector('.big-progress-text');
    if(hp === null && !hint){
      hpBox.insertAdjacentHTML('beforeend', `<div class="big-progress-text"><div class="t2">Add milestones to start tracking HP</div></div>`);
    } else if(hp !== null && hint){
      hint.remove();
    }
  }
}

function refreshMilestoneTab(id){
  const panel = dialogBody.querySelector('.tab-panel[data-tab="Milestones"]');
  if(panel) panel.innerHTML = buildMilestonesHTML(id);
  autoGrowAllDetailBoxes(panel);

/* ---------- milestone calendar navigation ---------- */
dialogBody.addEventListener('click', (e)=>{
  const prevBtn = e.target.closest('[data-action="cal-prev"]');
  const nextBtn = e.target.closest('[data-action="cal-next"]');
  if(prevBtn || nextBtn){
    const id = overlay.dataset.projectId;
    const view = getMilestoneView(id);
    view.month += prevBtn ? -1 : 1;
    if(view.month < 0){ view.month = 11; view.year--; }
    else if(view.month > 11){ view.month = 0; view.year++; }
    refreshMilestoneTab(id);
    return;
  }
  const dayCell = e.target.closest('.cal-cell.has-items[data-day]');
  if(dayCell){
    const id = overlay.dataset.projectId;
    const view = getMilestoneView(id);
    const day = parseInt(dayCell.dataset.day, 10);
    const items = milestoneState[id] || [];
    const match = items.find(it=>{
      if(!isISODate(it.date)) return false;
      const [y,mo,d] = it.date.split('-').map(Number);
      return y===view.year && mo-1===view.month && d===day;
    });
    if(match) openItemPopover(dayCell, { kind:'milestone', id, itemId: match.id });
  }
});

dialogBody.addEventListener('click', (e)=>{
  const addBtn = e.target.closest('[data-action="add"]');
  const toggleBtn = e.target.closest('[data-action="toggle"]');
  if(!addBtn && !toggleBtn) return;

  const wrap = e.target.closest('.edit-list-wrap');
  if(!wrap) return;
  const id = wrap.dataset.project;
  const kind = wrap.dataset.kind;
  const state = kind === 'milestone' ? milestoneState : timelineState;
  const save = kind === 'milestone' ? saveMilestoneState : saveTimelineState;
  const refresh = kind === 'milestone' ? refreshMilestoneTab : refreshTimelineTab;

  if(addBtn){
    if(kind === 'milestone'){
      const titleInput = wrap.querySelector('.edit-add-input.grow');
      const dateInput = wrap.querySelector('.edit-add-input.date');
      const text = titleInput.value.trim();
      if(!text) return;
      state[id].push({ id: nextUid(), text, date: dateInput.value.trim(), done:false });
    } else {
      const dateInput = wrap.querySelector('.edit-add-input.date');
      const textInput = wrap.querySelector('.edit-add-input.grow');
      const text = textInput.value.trim();
      if(!text) return;
      state[id].push({ id: nextUid(), date: dateInput.value.trim(), text });
    }
    save(state);
    refresh(id);
    const focusTarget = dialogBody.querySelector('.edit-add-input.grow');
    if(focusTarget) focusTarget.focus();
    return;
  }
  if(toggleBtn){
    const itemEl = e.target.closest('.edit-row');
    const item = state[id].find(i=>i.id===itemEl.dataset.item);
    if(item){ item.done = !item.done; save(state); refresh(id); }
    return;
  }
});

/* =========================================================
   CLICK-TO-EDIT POPOVER — shared by milestones, timeline
   and to-do items. Clicking any item's text pops out a small
   editor instead of showing inline inputs in the list.
   ========================================================= */
const itemPopover = document.getElementById('itemPopover');
const itemPopoverBody = document.getElementById('itemPopoverBody');
let popoverCtx = null;

function getPopoverStateArray(ctx){
  if(ctx.kind==='milestone') return milestoneState[ctx.id];
  if(ctx.kind==='timeline') return timelineState[ctx.id];
  return quadState[ctx.id][ctx.qid];
}
function savePopoverState(ctx){
  if(ctx.kind==='milestone') saveMilestoneState(milestoneState);
  else if(ctx.kind==='timeline') saveTimelineState(timelineState);
  else saveQuadState(quadState);
}
function refreshPopoverOwner(ctx){
  if(ctx.kind==='milestone') refreshMilestoneTab(ctx.id);
  else if(ctx.kind==='timeline') refreshTimelineTab(ctx.id);
  else refreshQuadrantTab(ctx.id);
}

function buildPopoverFields(ctx, item){
  if(ctx.kind==='milestone'){
    return `
      <div class="pop-label">詳細メモ <span class="pop-label-sub">— ${escapeHTML(item.text || '(タイトル未設定)')}</span></div>
      <textarea class="pop-input pop-textarea" data-field="detail" rows="6" placeholder="詳細メモを入力…" autofocus>${escapeHTML(item.detail || '')}</textarea>
      <div class="pop-actions">
        <span></span>
        <button class="pop-btn pop-btn-done" type="button" data-action="pop-close">完了</button>
      </div>
    `;
  }
  if(ctx.kind==='timeline'){
    return `
      <div class="pop-label">日付</div>
      <input class="pop-input" type="text" data-field="date" value="${escAttr(item.date)}" placeholder="Date">
      <div class="pop-label">できごと</div>
      <input class="pop-input" type="text" data-field="text" value="${escAttr(item.text)}" placeholder="What happened">
      <div class="pop-actions">
        <button class="pop-btn pop-btn-del" type="button" data-action="pop-delete">削除</button>
        <button class="pop-btn pop-btn-done" type="button" data-action="pop-close">完了</button>
      </div>
    `;
  }
  return `
    <div class="pop-label">タスク内容</div>
    <input class="pop-input" type="text" data-field="text" value="${escAttr(item.text)}" placeholder="Task">
    <div class="pop-actions">
      <button class="pop-btn pop-btn-del" type="button" data-action="pop-delete">削除</button>
      <button class="pop-btn pop-btn-done" type="button" data-action="pop-close">完了</button>
    </div>
  `;
}

function openItemPopover(anchorEl, ctx){
  popoverCtx = ctx;
  const arr = getPopoverStateArray(ctx);
  const item = arr && arr.find(i=>i.id===ctx.itemId);
  if(!item) return;
  itemPopoverBody.innerHTML = buildPopoverFields(ctx, item);

  const rect = anchorEl.getBoundingClientRect();
  const popW = 280;
  let left = rect.left;
  if(left + popW > window.innerWidth - 12) left = window.innerWidth - popW - 12;
  if(left < 12) left = 12;
  itemPopover.style.left = left + 'px';
  itemPopover.style.top = (rect.bottom + 8) + 'px';
  itemPopover.classList.add('open');

  requestAnimationFrame(()=>{
    const pRect = itemPopover.getBoundingClientRect();
    if(pRect.bottom > window.innerHeight - 12){
      itemPopover.style.top = Math.max(12, rect.top - pRect.height - 8) + 'px';
    }
  });

  const firstInput = itemPopoverBody.querySelector('.pop-input');
  if(firstInput){ firstInput.focus(); firstInput.select(); }
}
function closeItemPopover(){
  itemPopover.classList.remove('open');
  popoverCtx = null;
}

function updateRowDisplay(ctx, item){
  if(ctx.kind==='quad'){
    const el = dialogBody.querySelector(`.quad-item[data-item="${ctx.itemId}"] .quad-text`);
    if(el) el.textContent = item.text;
    return;
  }
  if(ctx.kind==='milestone'){
    refreshMilestoneTab(ctx.id);
    return;
  }
  const row = dialogBody.querySelector(`.edit-row[data-item="${ctx.itemId}"]`);
  if(!row) return;
  const titleEl = row.querySelector('.edit-row-title');
  if(titleEl) titleEl.textContent = item.text || '(内容未設定)';
  const dateEl = row.querySelector('.edit-row-date');
  if(dateEl) dateEl.textContent = item.date || '';
}

itemPopoverBody.addEventListener('input', (e)=>{

  if(e.target.closest('[data-action="pop-delete"]')){

/* =========================================================
   LONG-PRESS TO REORDER — unified across Milestones,
   Timeline, and To-Do items. Short tap still opens the
   edit popover above; a long-press pops the row out and
   lets you drag it to a new position in the same list.
   ========================================================= */
const reorderHint = document.getElementById('reorderHint');
const LONG_PRESS_MS = 420;
const MOVE_CANCEL_PX = 8;
const ROW_SELECTOR = '.edit-row, .quad-item';

let pressState = null;   // pending long-press timer info
let dragCtx = null;      // active drag info
let justDragged = false; // suppresses the click that follows a drag

function isRowEl(el){ return el && (el.classList.contains('edit-row') || el.classList.contains('quad-item') || el.classList.contains('ms-item-wrap')); }

function ctxFromItem(item){
  const quadPanel = item.closest('.quad-panel');
  if(quadPanel) return { kind:'quad', id: quadPanel.dataset.project, qid: item.dataset.quad || quadPanel.dataset.quad };
  const wrap = item.closest('.edit-list-wrap');
  if(wrap) return { kind: wrap.dataset.kind, id: wrap.dataset.project };
  return null;
}

dialogBody.addEventListener('pointerdown', (e)=>{
  if(e.button !== undefined && e.button !== 0) return;
  let item = e.target.closest(ROW_SELECTOR);
  if(!item || !dialogBody.contains(item)) return;
  if(e.target.closest('button')) return; // don't start a long-press from the checkbox
  if(item.classList.contains('edit-row') && item.parentElement && item.parentElement.classList.contains('ms-item-wrap')){
    item = item.parentElement; // drag the whole milestone (row + any open memo box) together
  }

  pressState = { x:e.clientX, y:e.clientY, item, pointerId:e.pointerId };
  clearTimeout(pressState.timer);
  pressState.timer = setTimeout(()=>{
    if(pressState) startDrag(pressState.item, e);
  }, LONG_PRESS_MS);
});

dialogBody.addEventListener('pointermove', (e)=>{
  if(pressState && !dragCtx){
    const dx = Math.abs(e.clientX - pressState.x), dy = Math.abs(e.clientY - pressState.y);
    if(dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX){
      clearTimeout(pressState.timer);
      pressState = null;
    }
  }
  if(dragCtx && e.pointerId === dragCtx.pointerId){
    onDragMove(e);
  }
});

function endPress(e){
  if(pressState) clearTimeout(pressState.timer);
  pressState = null;
  if(dragCtx && (!e || e.pointerId === dragCtx.pointerId)){
    endDrag();
  }
}
dialogBody.addEventListener('pointerup', endPress);
dialogBody.addEventListener('pointercancel', endPress);
dialogBody.addEventListener('pointerleave', (e)=>{ if(dragCtx) endPress(e); });

// swallow the click that naturally follows a long-press drag
dialogBody.addEventListener('click', (e)=>{
  if(justDragged){
    e.stopPropagation();
    e.preventDefault();
    justDragged = false;
  }
}, true);

function startDrag(item, e){
  pressState = null;
  const context = ctxFromItem(item);
  if(!context) return;
  const container = item.parentElement;
  const rowEls = Array.from(container.children).filter(isRowEl);
  const originalIndex = rowEls.indexOf(item);
  const rects = rowEls.map(el=>el.getBoundingClientRect());

  try{ item.setPointerCapture(e.pointerId); }catch(err){}
  try{ if(navigator.vibrate) navigator.vibrate(12); }catch(err){}

  dragCtx = {
    pointerId: e.pointerId, item, container, context,
    rowEls, rects, originalIndex, targetIndex: originalIndex,
    startX: e.clientX, startY: e.clientY, itemHeight: rects[originalIndex] ? rects[originalIndex].height : item.offsetHeight,
    crossContainer: null,
  };

  item.classList.add('sort-active');
  reorderHint.classList.add('show');
  positionHint(e);
}

function positionHint(e){
  reorderHint.style.left = Math.min(e.clientX + 14, window.innerWidth - 140) + 'px';
  reorderHint.style.top = Math.max(e.clientY - 44, 8) + 'px';
}

function clearOriginShift(){
  const { item, rowEls, originalIndex } = dragCtx;
  if(dragCtx.targetIndex !== originalIndex){
    dragCtx.targetIndex = originalIndex;
    rowEls.forEach(el=>{
      if(el===item) return;
      el.classList.remove('sort-shift');
      el.style.transform = '';
    });
  }
}

function onDragMove(e){
  e.preventDefault();
  const { item, rowEls, rects, originalIndex, startX, startY, itemHeight, context } = dragCtx;
  const deltaX = e.clientX - startX;
  const deltaY = e.clientY - startY;
  item.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(1.035)`;
  positionHint(e);

  // cross-quadrant / cross-bucket hover detection — To Do items only
  if(context.kind === 'quad'){
    // the dragged item (and the hint bubble) sit directly under the
    // pointer, so elementFromPoint would otherwise always hit them
    // instead of the quadrant underneath — hide them from hit-testing.
    item.style.pointerEvents = 'none';
    reorderHint.style.pointerEvents = 'none';
    const hoverEl = document.elementFromPoint(e.clientX, e.clientY);
    item.style.pointerEvents = '';
    reorderHint.style.pointerEvents = '';

    const hoverList = hoverEl ? hoverEl.closest('.quad-list') : null;
    const hoverContainer = (hoverList && hoverList !== dragCtx.container) ? hoverList : null;

    if(hoverContainer !== dragCtx.crossContainer){
      if(dragCtx.crossContainer){
        const prevPanel = dragCtx.crossContainer.closest('.quad-panel');
        if(prevPanel) prevPanel.classList.remove('drop-hover');
      }
      if(hoverContainer){
        const newPanel = hoverContainer.closest('.quad-panel');
        if(newPanel) newPanel.classList.add('drop-hover');
      }
      dragCtx.crossContainer = hoverContainer;
    }

    if(dragCtx.crossContainer){
      clearOriginShift();
      return;
    }
  }

  const originalCenter = rects[originalIndex].top + itemHeight/2;
  const currentCenter = originalCenter + deltaY;

  let newIndex = originalIndex;
  for(let i=0;i<rowEls.length;i++){
    if(i===originalIndex) continue;
    const c = rects[i].top + rects[i].height/2;
    if(i < originalIndex && currentCenter < c) newIndex = Math.min(newIndex, i);
    if(i > originalIndex && currentCenter > c) newIndex = Math.max(newIndex, i);
  }

  if(newIndex !== dragCtx.targetIndex){
    dragCtx.targetIndex = newIndex;
    rowEls.forEach((el, i)=>{
      if(el === item) return;
      let shift = 0;
      if(newIndex < originalIndex && i >= newIndex && i < originalIndex) shift = itemHeight;
      else if(newIndex > originalIndex && i > originalIndex && i <= newIndex) shift = -itemHeight;
      el.classList.add('sort-shift');
      el.style.transform = shift ? `translateY(${shift}px)` : '';
    });
  }
}

// When a To Do is dragged into Completed, log it to the Timeline too,
// dated with today so the timeline reads as an accurate history.
function todayDisplayString(){
  const now = new Date();
  return `${MONTH_NAMES[now.getMonth()].slice(0,3)} ${now.getDate()}`;
}
function logCompletionToTimeline(id, taskText, weight){
  if(weight < 3) return; // only Now (4) and Grow (3) tasks get auto-logged
  if(!timelineState[id]) timelineState[id] = [];
  timelineState[id].push({ id: nextUid(), date: todayDisplayString(), text: `Completed: ${taskText}` });
  saveTimelineState(timelineState);
  refreshTimelineTab(id);
}

function endDrag(){
  const { item, rowEls, context, originalIndex, targetIndex, crossContainer } = dragCtx;
  item.classList.remove('sort-active');
  item.style.transform = '';
  rowEls.forEach(el=>{ el.classList.remove('sort-shift'); el.style.transform = ''; });
  reorderHint.classList.remove('show');

  if(crossContainer && context.kind === 'quad'){
    const panel = crossContainer.closest('.quad-panel');
    if(panel) panel.classList.remove('drop-hover');

    const targetQid = crossContainer.dataset.quad; // 'q1'..'q4' or 'completed'
    const sourceArr = quadState[context.id] && quadState[context.id][context.qid];
    const idx = sourceArr ? sourceArr.findIndex(i=>i.id === item.dataset.item) : -1;

    if(idx > -1 && targetQid && targetQid !== context.qid){
      const [moved] = sourceArr.splice(idx, 1);
      if(targetQid === 'completed'){
        moved.done = true; // weight stays as-is, frozen from its last active quadrant
        logCompletionToTimeline(context.id, moved.text, moved.weight);
      } else {
        if(context.qid === 'completed') moved.done = false;
        moved.weight = QUAD_WEIGHT[targetQid]; // now sitting in this quadrant, so it counts at this weight
      }
      quadState[context.id][targetQid].push(moved);
      saveQuadState(quadState);
      refreshQuadrantTab(context.id);
    }

    justDragged = true;
    setTimeout(()=>{ justDragged = false; }, 350);
    dragCtx = null;
    return;
  }

  if(targetIndex !== originalIndex){
    const arr = getPopoverStateArray(context);
    if(arr){
      const [moved] = arr.splice(originalIndex, 1);
      arr.splice(targetIndex, 0, moved);
      savePopoverState(context);
      refreshPopoverOwner(context);
    }
    justDragged = true;
    setTimeout(()=>{ justDragged = false; }, 350);
  }
  dragCtx = null;
}

/* =========================================================
   LONG-PRESS TO REORDER — the project cards, extended to
   cross between the active grid and the Completed archive.
   Drag a card down into Completed to archive it; drag a
   completed row up into the grid to restore it to active.
   ========================================================= */
let cardPressState = null;
let cardDragCtx = null;
let cardJustDragged = false;
const dragRoot = document.querySelector('.app');

dragRoot.addEventListener('pointerdown', (e)=>{
  if(e.button !== undefined && e.button !== 0) return;
  const card = e.target.closest('.card:not(.is-empty):not(.add-project-tile)');
  const row = card ? null : e.target.closest('.completed-row');
  const item = card || row;
  if(!item) return;
  if(e.target.closest('button')) return; // don't start a long-press from icon/title-edit/add buttons

  cardPressState = { x:e.clientX, y:e.clientY, item, kind: card ? 'grid' : 'completed', pointerId:e.pointerId };
  clearTimeout(cardPressState.timer);
  cardPressState.timer = setTimeout(()=>{
    if(cardPressState) startCardDrag(cardPressState.item, cardPressState.kind, e);
  }, LONG_PRESS_MS);
});

dragRoot.addEventListener('pointermove', (e)=>{
  if(cardPressState && !cardDragCtx){
    const dx = Math.abs(e.clientX - cardPressState.x), dy = Math.abs(e.clientY - cardPressState.y);
    if(dx > MOVE_CANCEL_PX || dy > MOVE_CANCEL_PX){
      clearTimeout(cardPressState.timer);
      cardPressState = null;
    }
  }
  if(cardDragCtx && e.pointerId === cardDragCtx.pointerId){
    onCardDragMove(e);
  }
});

function endCardPress(e){
  if(cardPressState) clearTimeout(cardPressState.timer);
  cardPressState = null;
  if(cardDragCtx && (!e || e.pointerId === cardDragCtx.pointerId)){
    endCardDrag();
  }
}
dragRoot.addEventListener('pointerup', endCardPress);
dragRoot.addEventListener('pointercancel', endCardPress);
dragRoot.addEventListener('pointerleave', (e)=>{ if(cardDragCtx) endCardPress(e); });

dragRoot.addEventListener('click', (e)=>{
  if(cardJustDragged){
    e.stopPropagation();
    e.preventDefault();
    cardJustDragged = false;
  }
}, true);

function startCardDrag(item, kind, e){
  cardPressState = null;
  const siblingEls = kind === 'grid'
    ? Array.from(grid.children).filter(c=>c.classList.contains('card') && !c.classList.contains('add-project-tile'))
    : Array.from(document.querySelectorAll('.completed-row'));
  const originalIndex = siblingEls.indexOf(item);

  try{ item.setPointerCapture(e.pointerId); }catch(err){}
  try{ if(navigator.vibrate) navigator.vibrate(12); }catch(err){}

  cardDragCtx = {
    pointerId: e.pointerId, item, kind, siblingEls, originalIndex,
    startX: e.clientX, startY: e.clientY,
    targetEl: null, crossZone: false,
  };
  item.classList.add('sort-active');
  reorderHint.classList.add('show');
  positionHint(e);

  // show the "other" zone as a live drop target while dragging
  const completedSection = document.getElementById('completedSection');
  if(kind === 'grid'){
    completedSection.classList.add('drop-zone-active');
  } else {
    grid.classList.add('drop-zone-active');
  }
}

function onCardDragMove(e){
  e.preventDefault();
  const { item, kind, siblingEls } = cardDragCtx;
  const dx = e.clientX - cardDragCtx.startX, dy = e.clientY - cardDragCtx.startY;
  item.style.transform = `translate(${dx}px, ${dy}px) scale(1.045)`;
  positionHint(e);

  const otherContainer = kind === 'grid' ? document.getElementById('completedSection') : grid;
  const otherRect = otherContainer.getBoundingClientRect();
  const overOther = e.clientX >= otherRect.left && e.clientX <= otherRect.right && e.clientY >= otherRect.top && e.clientY <= otherRect.bottom;

  otherContainer.classList.toggle('drop-hover', overOther);
  cardDragCtx.crossZone = overOther;

  let hovered = null;
  if(!overOther){
    for(const el of siblingEls){
      if(el === item) continue;
      const r = el.getBoundingClientRect();
      if(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom){
        hovered = el;
        break;
      }
    }
  }
  if(cardDragCtx.targetEl && cardDragCtx.targetEl !== hovered){
    cardDragCtx.targetEl.classList.remove('sort-target');
  }
  if(hovered) hovered.classList.add('sort-target');
  cardDragCtx.targetEl = hovered;
}

function endCardDrag(){
  const { item, kind, targetEl, crossZone, originalIndex, siblingEls } = cardDragCtx;
  item.classList.remove('sort-active');
  item.style.transform = '';
  if(targetEl) targetEl.classList.remove('sort-target');
  document.getElementById('completedSection').classList.remove('drop-zone-active', 'drop-hover');
  grid.classList.remove('drop-zone-active', 'drop-hover');

  const id = item.dataset.id;

  if(crossZone && id){
    setProjectCompleted(id, kind === 'grid'); // dragged into Completed → true; dragged into grid → false (restore)
    cardJustDragged = true;
    setTimeout(()=>{ cardJustDragged = false; }, 350);
  } else if(targetEl){
    const targetIndex = siblingEls.indexOf(targetEl);
    const originalId = id, targetId = targetEl.dataset.id;
    const fromIdx = PROJECTS.findIndex(p=>p.id===originalId);
    const toIdx = PROJECTS.findIndex(p=>p.id===targetId);
    if(fromIdx > -1 && toIdx > -1){
      const [moved] = PROJECTS.splice(fromIdx, 1);
      PROJECTS.splice(toIdx, 0, moved);
      saveOrder();
      saveCustomProjects();
      renderGrid();
    }
    cardJustDragged = true;
    setTimeout(()=>{ cardJustDragged = false; }, 350);
  }
  reorderHint.classList.remove('show');
  cardDragCtx = null;
}

/* =========================================================
   CLOUD SYNC (Firebase) — an optional layer on top of the
   existing localStorage state. Local storage stays the source
   of truth for instant reads/writes; when a Sync Code is set,
   every save is also pushed to a shared Firestore document, and
   on load the latest cloud copy is pulled down if it's newer.
   ========================================================= */
const SYNC_CODE_KEY = 'projects_sync_code_v1';
const SYNC_META_KEY = 'projects_sync_meta_v1';
const SYNC_DATA_KEYS = { ORDER_KEY, META_KEY, QUAD_KEY, MILESTONE_KEY, TIMELINE_KEY, CUSTOM_PROJECTS_KEY };

function collectSyncBlob(){
  const read = (key)=>{ try{ return JSON.parse(localStorage.getItem(key) || 'null'); }catch(e){ return null; } };
  return {
    order: read(SYNC_DATA_KEYS.ORDER_KEY),
    meta: read(SYNC_DATA_KEYS.META_KEY),
    quad: read(SYNC_DATA_KEYS.QUAD_KEY),
    milestones: read(SYNC_DATA_KEYS.MILESTONE_KEY),
    timeline: read(SYNC_DATA_KEYS.TIMELINE_KEY),
    customProjects: read(SYNC_DATA_KEYS.CUSTOM_PROJECTS_KEY),
    savedAt: Date.now(),
  };
}
function applySyncBlob(blob){
  if(!blob) return;
  const write = (key, val)=>{ if(val !== undefined && val !== null) try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} };
  write(SYNC_DATA_KEYS.ORDER_KEY, blob.order);
  write(SYNC_DATA_KEYS.META_KEY, blob.meta);
  write(SYNC_DATA_KEYS.QUAD_KEY, blob.quad);
  write(SYNC_DATA_KEYS.MILESTONE_KEY, blob.milestones);
  write(SYNC_DATA_KEYS.TIMELINE_KEY, blob.timeline);
  write(SYNC_DATA_KEYS.CUSTOM_PROJECTS_KEY, blob.customProjects);
}
function getLastSyncedAt(){
  try{ return (JSON.parse(localStorage.getItem(SYNC_META_KEY) || '{}').lastCloudSavedAt) || 0; }catch(e){ return 0; }
}
function setLastSyncedAt(ts){
  try{ localStorage.setItem(SYNC_META_KEY, JSON.stringify({ lastCloudSavedAt: ts })); }catch(e){}
}
function getSyncCode(){ try{ return localStorage.getItem(SYNC_CODE_KEY) || ''; }catch(e){ return ''; } }
function setSyncCode(code){ try{ if(code) localStorage.setItem(SYNC_CODE_KEY, code); else localStorage.removeItem(SYNC_CODE_KEY); }catch(e){} }

function debounce(fn, wait){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), wait); };
}

const pushToCloudDebounced = debounce(async ()=>{
  if(!window.firebaseSync || !window.firebaseSync.isConnected()) return;
  const blob = collectSyncBlob();
  await window.firebaseSync.push(blob);
  setLastSyncedAt(blob.savedAt);
  setSyncStatus('同期済み ' + new Date(blob.savedAt).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}));
}, 900);

// monkey-patch the existing save*State functions so every local
// write also triggers a debounced cloud push, without touching
// the many call sites scattered through the app.
(function(){
  const _saveOrder = saveOrder;
  saveOrder = function(...a){ const r = _saveOrder(...a); pushToCloudDebounced(); return r; };
  const _saveMeta = saveMeta;
  saveMeta = function(...a){ const r = _saveMeta(...a); pushToCloudDebounced(); return r; };
  const _saveQuadState = saveQuadState;
  saveQuadState = function(...a){ const r = _saveQuadState(...a); pushToCloudDebounced(); return r; };
  const _saveMilestoneState = saveMilestoneState;
  saveMilestoneState = function(...a){ const r = _saveMilestoneState(...a); pushToCloudDebounced(); return r; };
  const _saveTimelineState = saveTimelineState;
  saveTimelineState = function(...a){ const r = _saveTimelineState(...a); pushToCloudDebounced(); return r; };
})();

/* ---------- Sync UI ---------- */
const syncBtn = document.getElementById('syncBtn');
const syncBtnLabel = document.getElementById('syncBtnLabel');
const syncDot = document.getElementById('syncDot');
const syncPopover = document.getElementById('syncPopover');
const syncCodeInput = document.getElementById('syncCodeInput');
const syncConnectBtn = document.getElementById('syncConnectBtn');
const syncDisconnectBtn = document.getElementById('syncDisconnectBtn');
const syncStatusText = document.getElementById('syncStatusText');
const syncLoadingOverlay = document.getElementById('syncLoadingOverlay');

function setSyncStatus(text){ if(syncStatusText) syncStatusText.textContent = text; }

function refreshSyncButton(){
  const code = getSyncCode();
  if(code){
    syncBtn.classList.add('connected');
    syncBtnLabel.textContent = 'Synced';
    syncCodeInput.value = code;
    syncDisconnectBtn.style.display = '';
  } else {
    syncBtn.classList.remove('connected');
    syncBtnLabel.textContent = 'Sync off';
    syncDisconnectBtn.style.display = 'none';
  }
}

syncBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  const rect = syncBtn.getBoundingClientRect();
  const popW = 300;
  let left = rect.right - popW;
  if(left < 12) left = 12;
  syncPopover.style.left = left + 'px';
  syncPopover.style.top = (rect.bottom + 8) + 'px';
  syncPopover.classList.toggle('open');
  setSyncStatus(window.firebaseSync ? '' : 'Firebase未設定です(コード側で設定が必要)');
});
document.addEventListener('click', (e)=>{
  if(syncPopover.classList.contains('open') && !syncPopover.contains(e.target) && e.target !== syncBtn && !syncBtn.contains(e.target)){
    syncPopover.classList.remove('open');
  }
});

syncConnectBtn.addEventListener('click', async ()=>{
  const code = syncCodeInput.value.trim();
  if(!code){ setSyncStatus('Sync Codeを入力してください'); return; }
  if(!window.firebaseSync){ setSyncStatus('Firebase未設定です(コード側でconfigを設定してください)'); return; }

  setSyncStatus('接続しています…');
  await window.firebaseSync.connect(code);
  setSyncCode(code);
  refreshSyncButton();

  const cloudBlob = await window.firebaseSync.pull();
  if(cloudBlob){
    applySyncBlob(cloudBlob);
    setLastSyncedAt(cloudBlob.savedAt || Date.now());
    setSyncStatus('クラウドのデータを読み込みました。再読み込みします…');
    setTimeout(()=> location.reload(), 500);
  } else {
    // nothing in the cloud yet for this code — push current local state
    const blob = collectSyncBlob();
    await window.firebaseSync.push(blob);
    setLastSyncedAt(blob.savedAt);
    setSyncStatus('接続しました。このデータをクラウドに保存しました。');
  }
});

syncDisconnectBtn.addEventListener('click', ()=>{
  setSyncCode('');
  refreshSyncButton();
  setSyncStatus('切断しました(ローカル保存のみになります)');
});

refreshSyncButton();

// on load: if already connected, pull the latest cloud copy and
// only reload if it's actually newer than what we already applied.
window.addEventListener('load', async ()=>{
  const code = getSyncCode();
  if(!code || !window.firebaseSync){ return; }

  syncLoadingOverlay.classList.add('show');
  try{
    await window.firebaseSync.connect(code);
    const cloudBlob = await window.firebaseSync.pull();
    if(cloudBlob && cloudBlob.savedAt > getLastSyncedAt()){
      applySyncBlob(cloudBlob);
      setLastSyncedAt(cloudBlob.savedAt);
      location.reload();
      return;
    }
  }catch(err){
    console.warn('cloud sync check failed', err);
  }
  syncLoadingOverlay.classList.remove('show');
});
</script>

    }

    window.firebaseSync = { connect, pull, push, isConnected: ()=> !!docRef };
  }
